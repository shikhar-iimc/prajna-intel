<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0C0A14"/>
      <stop offset="100%" style="stop-color:#060408"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:0.15"/>
      <stop offset="70%" style="stop-color:#FF9933;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FF9933;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8943E"/>
      <stop offset="45%" style="stop-color:#E8C96A"/>
      <stop offset="100%" style="stop-color:#B8943E"/>
    </linearGradient>

    <linearGradient id="saffron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9933"/>
      <stop offset="100%" style="stop-color:#E67300"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Ambient centre glow -->
  <circle cx="200" cy="200" r="130" fill="url(#centerGlow)"/>

  <!-- ── OUTERMOST RING — hairline precision ── -->
  <circle cx="200" cy="200" r="176" fill="none" 
          stroke="#C8A96E" stroke-width="0.5" opacity="0.25"/>

  <!-- ── OUTER RING — main border ── -->
  <circle cx="200" cy="200" r="168" fill="none" 
          stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.5"
          filter="url(#subtleGlow)"/>

  <!-- ── ASHOKA CHAKRA RING — outer ── -->
  <circle cx="200" cy="200" r="108" fill="none"
          stroke="url(#goldGrad)" stroke-width="1.8" opacity="0.7"
          filter="url(#subtleGlow)"/>

  <!-- ── ASHOKA CHAKRA — 24 spokes ── -->
  <!-- Each spoke from r=108 inward to r=72 -->
  <g filter="url(#subtleGlow)">
    <!-- Saffron spoke layer -->
    <g stroke="#FF9933" stroke-width="1" opacity="0.55" stroke-linecap="round">
      <line x1="200" y1="92" x2="200" y2="128"/>
      <line x1="215.9" y1="92.7" x2="211.9" y2="128.4"/>
      <line x1="231.2" y1="95.3" x2="223.4" y2="130.2"/>
      <line x1="245.5" y1="99.9" x2="234.1" y2="133.2"/>
      <line x1="258.4" y1="106.3" x2="244.0" y2="137.5"/>
      <line x1="269.7" y1="114.4" x2="252.9" y2="142.9"/>
      <line x1="279.0" y1="124.1" x2="260.6" y2="149.4"/>
      <line x1="286.1" y1="135.1" x2="266.9" y2="156.8"/>
      <line x1="290.9" y1="147.3" x2="271.6" y2="165.0"/>
      <line x1="293.3" y1="160.3" x2="274.6" y2="173.7"/>
      <line x1="293.3" y1="173.7" x2="275.9" y2="182.5"/>
      <line x1="290.9" y1="186.8" x2="275.5" y2="191.2"/>
      <line x1="286.1" y1="199.2" x2="273.4" y2="199.2"/>
      <line x1="279.0" y1="210.6" x2="269.7" y2="206.9"/>
      <line x1="269.7" y1="220.8" x2="264.6" y2="214.3"/>
      <line x1="258.4" y1="229.0" x2="257.6" y2="221.1"/>
      <line x1="245.5" y1="234.9" x2="248.9" y2="227.2"/>
      <line x1="231.2" y1="238.5" x2="238.5" y2="232.4"/>
      <line x1="215.9" y1="239.8" x2="226.5" y2="235.8"/>
      <line x1="200" y1="238.8" x2="213.1" y2="237.5"/>
      <line x1="184.1" y1="235.5" x2="198.8" y2="236.8"/>
      <line x1="168.8" y1="229.9" x2="183.8" y2="233.8"/>
      <line x1="154.5" y1="222.1" x2="168.3" y2="228.6"/>
      <line x1="141.6" y1="212.5" x2="153.8" y2="221.6"/>
    </g>

    <!-- Gold spoke overlay — alternate spokes, thinner -->
    <g stroke="#C8A96E" stroke-width="0.6" opacity="0.4" stroke-linecap="round">
      <line x1="200" y1="92" x2="200" y2="128"/>
      <line x1="231.2" y1="95.3" x2="223.4" y2="130.2"/>
      <line x1="258.4" y1="106.3" x2="244.0" y2="137.5"/>
      <line x1="279.0" y1="124.1" x2="260.6" y2="149.4"/>
      <line x1="290.9" y1="147.3" x2="271.6" y2="165.0"/>
      <line x1="293.3" y1="173.7" x2="275.9" y2="182.5"/>
      <line x1="286.1" y1="199.2" x2="273.4" y2="199.2"/>
      <line x1="269.7" y1="220.8" x2="264.6" y2="214.3"/>
      <line x1="245.5" y1="234.9" x2="248.9" y2="227.2"/>
      <line x1="215.9" y1="239.8" x2="226.5" y2="235.8"/>
      <line x1="184.1" y1="235.5" x2="198.8" y2="236.8"/>
      <line x1="154.5" y1="222.1" x2="168.3" y2="228.6"/>
    </g>
  </g>

  <!-- ── CHAKRA INNER RING ── -->
  <circle cx="200" cy="200" r="72" fill="none"
          stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.65"
          filter="url(#subtleGlow)"/>

  <!-- ── INNER RING ── -->
  <circle cx="200" cy="200" r="48" fill="none"
          stroke="#C8A96E" stroke-width="0.8" opacity="0.3"/>

  <!-- ── TRICOLOUR ARCS — ultra subtle ── -->
  <!-- Saffron — top quarter arc -->
  <path d="M 148 152 A 73 73 0 0 1 252 152"
        fill="none" stroke="#FF9933" stroke-width="2.5" 
        stroke-linecap="round" opacity="0.5"
        filter="url(#subtleGlow)"/>
  <!-- Green — bottom quarter arc -->
  <path d="M 148 248 A 73 73 0 0 0 252 248"
        fill="none" stroke="#138808" stroke-width="2.5"
        stroke-linecap="round" opacity="0.5"
        filter="url(#subtleGlow)"/>
  <!-- Navy — right arc -->
  <path d="M 273 200 A 73 73 0 0 1 252 248"
        fill="none" stroke="#000066" stroke-width="2"
        stroke-linecap="round" opacity="0.6"/>

  <!-- ── NEURAL CONSTELLATION ── -->
  <!-- Outer constellation points — 8 cardinal/intercardinal positions -->
  <g filter="url(#subtleGlow)">
    <!-- 8 outer nodes at r=55 -->
    <circle cx="200" cy="145" r="2.2" fill="#FF9933" opacity="0.7"/>
    <circle cx="239" cy="161" r="1.8" fill="#C8A96E" opacity="0.6"/>
    <circle cx="255" cy="200" r="2.2" fill="#FF9933" opacity="0.7"/>
    <circle cx="239" cy="239" r="1.8" fill="#C8A96E" opacity="0.6"/>
    <circle cx="200" cy="255" r="2.2" fill="#FF9933" opacity="0.7"/>
    <circle cx="161" cy="239" r="1.8" fill="#C8A96E" opacity="0.6"/>
    <circle cx="145" cy="200" r="2.2" fill="#FF9933" opacity="0.7"/>
    <circle cx="161" cy="161" r="1.8" fill="#C8A96E" opacity="0.6"/>
  </g>

  <!-- Connection lines — neural web -->
  <g stroke="#FF9933" stroke-width="0.5" opacity="0.2">
    <line x1="200" y1="145" x2="239" y2="161"/>
    <line x1="239" y1="161" x2="255" y2="200"/>
    <line x1="255" y1="200" x2="239" y2="239"/>
    <line x1="239" y1="239" x2="200" y2="255"/>
    <line x1="200" y1="255" x2="161" y2="239"/>
    <line x1="161" y1="239" x2="145" y2="200"/>
    <line x1="145" y1="200" x2="161" y2="161"/>
    <line x1="161" y1="161" x2="200" y2="145"/>
    <!-- Cross connections -->
    <line x1="200" y1="145" x2="255" y2="200"/>
    <line x1="255" y1="200" x2="200" y2="255"/>
    <line x1="200" y1="255" x2="145" y2="200"/>
    <line x1="145" y1="200" x2="200" y2="145"/>
    <line x1="239" y1="161" x2="239" y2="239"/>
    <line x1="161" y1="161" x2="161" y2="239"/>
    <!-- To centre -->
    <line x1="200" y1="145" x2="200" y2="200"/>
    <line x1="255" y1="200" x2="200" y2="200"/>
    <line x1="200" y1="255" x2="200" y2="200"/>
    <line x1="145" y1="200" x2="200" y2="200"/>
  </g>

  <!-- ── CENTRE — the eye of wisdom ── -->
  <!-- Outer pulse ring -->
  <circle cx="200" cy="200" r="18" fill="none"
          stroke="#FF9933" stroke-width="0.8" opacity="0.2"/>
  <circle cx="200" cy="200" r="13" fill="none"
          stroke="#FF9933" stroke-width="0.6" opacity="0.3"/>

  <!-- Centre orb -->
  <circle cx="200" cy="200" r="9" 
          fill="#FF9933" opacity="0.12"
          filter="url(#strongGlow)"/>
  <circle cx="200" cy="200" r="6.5" 
          fill="#0C0A14" stroke="#FF9933" 
          stroke-width="1.2" opacity="0.9"
          filter="url(#softGlow)"/>
  <circle cx="200" cy="200" r="3.5" 
          fill="#FF9933" opacity="0.85"
          filter="url(#softGlow)"/>
  <!-- Inner highlight -->
  <circle cx="198.5" cy="198.5" r="1.2" fill="#FFE066" opacity="0.8"/>

  <!-- ── FOUR CARDINAL DIAMOND MARKS ── -->
  <g fill="#C8A96E" opacity="0.45" filter="url(#subtleGlow)">
    <!-- Top -->
    <polygon points="200,77 203,83 200,89 197,83"/>
    <!-- Right -->
    <polygon points="323,200 317,203 311,200 317,197"/>
    <!-- Bottom -->
    <polygon points="200,323 203,317 200,311 197,317"/>
    <!-- Left -->
    <polygon points="77,200 83,203 89,200 83,197"/>
  </g>

  <!-- ── CORNER RETICLE MARKS ── -->
  <g stroke="#C8A96E" stroke-width="0.8" opacity="0.3" stroke-linecap="round">
    <line x1="48" y1="68" x2="64" y2="68"/>
    <line x1="48" y1="68" x2="48" y2="84"/>
    <line x1="352" y1="68" x2="336" y2="68"/>
    <line x1="352" y1="68" x2="352" y2="84"/>
    <line x1="48" y1="332" x2="64" y2="332"/>
    <line x1="48" y1="332" x2="48" y2="316"/>
    <line x1="352" y1="332" x2="336" y2="332"/>
    <line x1="352" y1="332" x2="352" y2="316"/>
  </g>

  <!-- ── DEGREE MARKS on outer ring — like a compass ── -->
  <g stroke="#C8A96E" stroke-width="0.7" opacity="0.25">
    <!-- 12 tick marks every 30 degrees -->
    <line x1="200" y1="24" x2="200" y2="34"/>
    <line x1="288" y1="50" x2="283" y2="59"/>
    <line x1="350" y1="112" x2="341" y2="117"/>
    <line x1="376" y1="200" x2="366" y2="200"/>
    <line x1="350" y1="288" x2="341" y2="283"/>
    <line x1="288" y1="350" x2="283" y2="341"/>
    <line x1="200" y1="376" x2="200" y2="366"/>
    <line x1="112" y1="350" x2="117" y2="341"/>
    <line x1="50" y1="288" x2="59" y2="283"/>
    <line x1="24" y1="200" x2="34" y2="200"/>
    <line x1="50" y1="112" x2="59" y2="117"/>
    <line x1="112" y1="50" x2="117" y2="59"/>
  </g>

</svg>
